name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pdfkit pypdf pyinstaller

      - name: Build exe with PyInstaller
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --windowed --name "TA Invoices and Estimates" --hidden-import pypdf --add-data "logo_grayblue_transparent.png;." adael_desktop.py

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TA Invoices and Estimates.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
